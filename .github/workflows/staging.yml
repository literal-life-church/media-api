name: Staging

on:
  push:
    branches-ignore:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.deployment-url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: dopplerhq/cli-action@v3

      - name: Export Doppler secrets
        run: |
          SECRETS=$(doppler secrets download --no-file --format json --token "$DOPPLER_TOKEN" | jq 'del(.DOPPLER_CONFIG, .DOPPLER_ENVIRONMENT, .DOPPLER_PROJECT)')
          echo "$SECRETS" | jq -r 'to_entries[] | select(.key != "NODE_ENV") | "::add-mask::\(.value)"'
          echo "NODE_ENV=staging" >> "$GITHUB_ENV"
          echo "$SECRETS" | jq -r 'to_entries[] | select(.key != "NODE_ENV") | "\(.key)=\(.value)"' >> "$GITHUB_ENV"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STAGING }}

      - name: Migrate staging database
        run: npm run db:migrate

      - name: Deploy to staging
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy --env staging

      - name: Sync secrets to Cloudflare Worker
        run: |
          doppler secrets download --no-file --format json --token "$DOPPLER_TOKEN" | \
            jq 'del(.DOPPLER_CONFIG, .DOPPLER_ENVIRONMENT, .DOPPLER_PROJECT)' | \
            npx wrangler secret bulk --env staging
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STAGING }}
