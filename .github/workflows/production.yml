name: Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: dopplerhq/cli-action@v3

      - name: Export Doppler secrets
        run: |
          SECRETS=$(doppler secrets download --no-file --format json --token "$DOPPLER_TOKEN")
          echo "$SECRETS" | jq -r 'to_entries[] | "::add-mask::\(.value)"'
          echo "NODE_ENV=production" >> "$GITHUB_ENV"
          echo "$SECRETS" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRODUCTION }}

      - name: Migrate production database
        run: npm run db:migrate

      - name: Sync secrets to Cloudflare Worker
        run: |
          doppler secrets download --no-file --format json --token "$DOPPLER_TOKEN" | \
            npx wrangler secret bulk
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRODUCTION }}

      - name: Deploy to production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
